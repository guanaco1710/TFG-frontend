name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── Quality gate (format + analyze) ────────────────────────────────────────
  quality:
    name: Format & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze --fatal-infos

  # ── Tests with coverage ─────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 7

      - name: Check 100% coverage
        run: |
          # Print per-file breakdown to aid debugging
          echo "--- Per-file coverage ---"
          awk '
            /^SF:/ { file=substr($0,4); lh=0; lf=0 }
            /^LH:/ { lh=substr($0,4) }
            /^LF:/ { lf=substr($0,4); if (lf+0 > 0 && lh+0 < lf+0) print "MISS " lh "/" lf " " file }
          ' coverage/lcov.info
          echo "-------------------------"
          # Exclude entrypoint files (main.dart) that are untestable by unit tests
          COVERAGE=$(awk '
            /^SF:lib\/main\.dart$/ { skip=1 }
            skip && /^end_of_record/ { skip=0; next }
            skip { next }
            /^LH:/ { hit+=substr($0,4) }
            /^LF:/ { found+=substr($0,4) }
            END { if (found > 0) print int(hit*100/found); else print 0 }
          ' coverage/lcov.info)
          echo "Code coverage (excluding main.dart): ${COVERAGE}%"
          if [ "$COVERAGE" -lt 100 ]; then
            echo "❌ Coverage is ${COVERAGE}%, must be 100%"
            exit 1
          fi
          echo "✅ 100% coverage achieved"

  # ── Build web (fast sanity check, artifact kept 7 days) ────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.sha }}
          path: build/web/
          retention-days: 7

  # ── Build Android debug APK ─────────────────────────────────────────────────
  build-android:
    name: Build Android APK (debug)
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
